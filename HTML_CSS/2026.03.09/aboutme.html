<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>About Me Card</title>
    <style>
      body {
        background: #e9e9e9;
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        width: 320px;
        background: white;
        border-radius: 20px;
        overflow: hidden;
        border: 6px solid #3b6edc;
        text-align: center;
      }

      .top {
        background: linear-gradient(135deg, #6fa8ff, #3b6edc);
        padding: 50px 0 80px 0;
        position: relative;
      }

      .avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 6px solid white;
        background: url("https://cdn-icons-png.flaticon.com/512/3135/3135715.png")
          center/cover;
        position: absolute;
        left: 50%;
        bottom: -70px;
        transform: translateX(-50%);
      }

      .content {
        padding: 80px 25px 25px 25px;
      }

      h1 {
        color: #6b5cff;
        margin-bottom: 10px;
      }

      p {
        font-size: 14px;
        color: #444;
      }

      .social {
        margin: 20px 0;
      }

      .social span {
        display: inline-block;
        width: 35px;
        height: 35px;
        line-height: 35px;
        border-radius: 50%;
        background: #f0f0f0;
        margin: 0 5px;
        font-size: 14px;
      }

      .list {
        text-align: left;
        margin: 15px 0;
      }

      .list li {
        margin: 6px 0;
      }

      .buttons {
        margin-top: 15px;
      }

      .btn {
        border: none;
        padding: 10px 18px;
        border-radius: 20px;
        color: white;
        cursor: pointer;
        margin: 5px;
      }

      .subscribe {
        background: #ff8c3a;
      }

      .contact {
        background: #6b5cff;
      }

      .stats {
        margin-top: 15px;
        color: #444;
        font-size: 14px;
      }

      .stats span {
        margin: 0 8px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <div class="top">
        <div class="avatar"></div>
      </div>

      <div class="content">
        <h1>About Me</h1>
        <p>
          I'm passionate about creating interactive websites, exploring new
          technologies, and sharing knowledge with others.
        </p>

        <div class="social">
          <span>f</span>
          <span>t</span>
          <span>ig</span>
          <span>💬</span>
        </div>

        <ul class="list">
          <li>💙 Web Design</li>
          <li>💙 JavaScript</li>
          <li>⚡ UI/UX</li>
        </ul>

        <div class="buttons">
          <button class="btn subscribe">Subscribe</button>
          <button class="btn contact">Contact</button>
        </div>

        <div class="stats">
          <span>❤ 60.4k</span>
          <span>💬 20k</span>
          <span>👁 12.4k</span>
        </div>
      </div>
    </div>
  </body>
</html>
